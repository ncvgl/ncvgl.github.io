<svg width="520" height="710" viewBox="0 0 520 710" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#bbb"/>
    </marker>
  </defs>

  <style>text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }</style>

  <rect width="520" height="710" fill="#fafafa"/>

  <!-- You -->
  <rect x="185" y="20" width="150" height="38" rx="5" fill="#fff" stroke="#222" stroke-width="1.5"/>
  <text x="260" y="44" text-anchor="middle" font-size="14" font-weight="600" fill="#222">You</text>

  <!-- Arrow: You → CTO -->
  <line x1="260" y1="58" x2="260" y2="88" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="268" y="78" font-size="11" fill="#999">task</text>

  <!-- CTO 1 -->
  <rect x="155" y="90" width="210" height="50" rx="5" fill="#f0f0f0" stroke="#222" stroke-width="1.5"/>
  <text x="260" y="111" text-anchor="middle" font-size="14" font-weight="600" fill="#222">CTO Agent</text>
  <text x="260" y="128" text-anchor="middle" font-size="10" fill="#999">persistent session</text>

  <!-- Arrow: CTO → Dev -->
  <line x1="260" y1="140" x2="260" y2="170" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="268" y="160" font-size="11" fill="#999">spawns</text>

  <!-- Developer Agent -->
  <rect x="75" y="172" width="370" height="182" rx="5" fill="#fff" stroke="#222" stroke-width="1.5"/>
  <text x="260" y="193" text-anchor="middle" font-size="13" font-weight="600" fill="#222">Developer Agent</text>
  <text x="260" y="209" text-anchor="middle" font-size="10" fill="#bbb">ephemeral · fresh context</text>
  <line x1="95" y1="216" x2="425" y2="216" stroke="#ebebeb" stroke-width="1"/>
  <text x="105" y="234" font-size="12" fill="#333">① write test</text>
  <text x="415" y="234" text-anchor="end" font-size="11" fill="#c0392b">✗ fails</text>
  <text x="105" y="252" font-size="12" fill="#333">② build feature</text>
  <text x="415" y="252" text-anchor="end" font-size="11" fill="#27ae60">✓ passes</text>
  <text x="105" y="270" font-size="12" fill="#333">③ run all tests</text>
  <text x="105" y="288" font-size="12" fill="#333">④ fix regressions if needed</text>
  <text x="105" y="306" font-size="12" fill="#333">⑤ commit &amp; push</text>
  <text x="105" y="324" font-size="12" fill="#333">⑥ report back to CTO</text>

  <!-- Arrow: Dev → CTO 2 -->
  <line x1="260" y1="354" x2="260" y2="382" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CTO 2 -->
  <rect x="155" y="384" width="210" height="50" rx="5" fill="#f0f0f0" stroke="#222" stroke-width="1.5"/>
  <text x="260" y="405" text-anchor="middle" font-size="14" font-weight="600" fill="#222">CTO Agent</text>
  <text x="260" y="422" text-anchor="middle" font-size="10" fill="#999">persistent session</text>

  <!-- Arrow: CTO → QA -->
  <line x1="260" y1="434" x2="260" y2="462" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="268" y="453" font-size="11" fill="#999">spawns</text>

  <!-- QA Agent -->
  <rect x="75" y="464" width="370" height="148" rx="5" fill="#fff" stroke="#222" stroke-width="1.5"/>
  <text x="260" y="485" text-anchor="middle" font-size="13" font-weight="600" fill="#222">QA Agent</text>
  <text x="260" y="501" text-anchor="middle" font-size="10" fill="#bbb">ephemeral · Chrome MCP</text>
  <line x1="95" y1="508" x2="425" y2="508" stroke="#ebebeb" stroke-width="1"/>
  <text x="105" y="526" font-size="12" fill="#333">① test features in browser</text>
  <text x="105" y="544" font-size="12" fill="#333">② compare to real Slack</text>
  <text x="105" y="562" font-size="12" fill="#333">③ screenshot bugs found</text>
  <text x="105" y="580" font-size="12" fill="#333">④ write qa-report.md</text>

  <!-- Arrow: QA → CTO 3 -->
  <line x1="260" y1="612" x2="260" y2="640" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="268" y="630" font-size="11" fill="#999">bug report</text>

  <!-- CTO 3 -->
  <rect x="155" y="642" width="210" height="50" rx="5" fill="#f0f0f0" stroke="#222" stroke-width="1.5"/>
  <text x="260" y="663" text-anchor="middle" font-size="14" font-weight="600" fill="#222">CTO Agent</text>
  <text x="260" y="680" text-anchor="middle" font-size="10" fill="#999">persistent session</text>

  <!-- Loop arrow: right side -->
  <path d="M 365 667 L 475 667 L 475 115 L 365 115"
        stroke="#ccc" stroke-width="1.5" fill="none" stroke-dasharray="6,4"
        marker-end="url(#arr-g)"/>
  <text transform="translate(488, 391) rotate(90)" text-anchor="middle" font-size="11" fill="#bbb">next feature</text>
</svg>
